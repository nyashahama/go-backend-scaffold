name: Release

on:
  push:
    tags:
      - 'v*'

env:
  DATABASE_URL: postgres://user:change-me-local-dev@localhost:5432/scaffold?sslmode=disable
  REDIS_URL: redis://localhost:6379

jobs:
  release:
    name: Build & Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: user
          POSTGRES_PASSWORD: change-me-local-dev
          POSTGRES_DB: scaffold
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U user"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.9'
          cache: true

      - name: Install release verification tools
        run: |
          go install github.com/pressly/goose/v3/cmd/goose@latest
          go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Run migrations
        run: make migrate-up

      - name: Run release verification
        run: |
          make test-ci

      - name: Check Go dependencies for known vulnerabilities
        continue-on-error: true
        run: make security-check

      - name: Build binary
        run: |
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 \
            go build -ldflags="-s -w -X main.version=${{ github.ref_name }}" \
            -o bin/server ./cmd/server/

      - name: Upload binary to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: bin/server
          generate_release_notes: true

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Docker image
        run: docker build -t ghcr.io/${{ github.repository }}:${{ github.ref_name }} .

      - name: Scan Docker image for high and critical vulnerabilities
        run: docker run --rm -v /var/run/docker.sock:/var/run/docker.sock aquasec/trivy:0.57.1 image --scanners vuln --severity HIGH,CRITICAL --exit-code 1 --no-progress ghcr.io/${{ github.repository }}:${{ github.ref_name }}

      - name: Tag Docker image as latest
        run: docker tag ghcr.io/${{ github.repository }}:${{ github.ref_name }} ghcr.io/${{ github.repository }}:latest

      - name: Push Docker images
        run: |
          docker push ghcr.io/${{ github.repository }}:${{ github.ref_name }}
          docker push ghcr.io/${{ github.repository }}:latest
