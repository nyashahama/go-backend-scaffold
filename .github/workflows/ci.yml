name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  DATABASE_URL: postgres://user:change-me-local-dev@localhost:5432/scaffold?sslmode=disable
  REDIS_URL: redis://localhost:6379

jobs:
  verify:
    name: Startup Readiness
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: user
          POSTGRES_PASSWORD: change-me-local-dev
          POSTGRES_DB: scaffold
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U user"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.9'
          cache: true

      - name: Install tools
        run: |
          go install github.com/pressly/goose/v3/cmd/goose@latest
          go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Run migrations
        run: make migrate-up

      - name: Lint
        uses: golangci/golangci-lint-action@v9

      - name: Run documented CI test gate
        run: make test-ci

      - name: Check Go dependencies for known vulnerabilities
        continue-on-error: true
        run: make security-check

      - name: Verify Docker image build
        run: docker build -t go-backend-scaffold:ci .

      - name: Scan Docker image for high and critical vulnerabilities
        run: docker run --rm -v /var/run/docker.sock:/var/run/docker.sock aquasec/trivy:0.57.1 image --scanners vuln --severity HIGH,CRITICAL --exit-code 1 --no-progress go-backend-scaffold:ci
