name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Lint, Build & Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: user
          POSTGRES_PASSWORD: password
          POSTGRES_DB: scaffold
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U user"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24.2'
          cache: true

      - name: Install tools
        run: go install github.com/pressly/goose/v3/cmd/goose@v3.26.0
        env:
          GOTOOLCHAIN: local

      - name: Run migrations
        env:
          DATABASE_URL: postgres://user:password@localhost:5432/scaffold?sslmode=disable
        run: goose -dir db/migrations postgres "$DATABASE_URL" up

      - name: Download modules
        run: go mod download
        env:
          GOTOOLCHAIN: local

      - name: Lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          skip-cache: true
        env:
          GOTOOLCHAIN: local

      - name: Unit tests
        run: go test ./internal/... -race -cover

      - name: Integration tests
        env:
          DATABASE_URL: postgres://user:password@localhost:5432/scaffold?sslmode=disable
          REDIS_URL: redis://localhost:6379
        run: go test ./tests/integration/... -v -race -tags=integration
